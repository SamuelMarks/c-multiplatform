name: CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    uses: SamuelMarks/c-ci/.github/workflows/c-cmake-ci.yml@master
    with:
      extra_apt_packages: "libcurl4-openssl-dev pkg-config libssl-dev libsqlite3-dev"
      extra_brew_packages: "curl pkg-config openssl sqlite"
#      extra_winget_packages: "curl.curl pkg-config OpenSSL.OpenSSL"
